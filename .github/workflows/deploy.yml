name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Verify App Structure
        run: |
          echo "Checking project structure..."
          ls -la
          echo "Frontend files:"
          ls -la public/
          echo "Backend file:"
          cat server.js
          echo "✅ All files verified!"

      - name: Test Server Starts
        run: |
          node server.js &
          sleep 3
          curl http://localhost:3000 && echo "✅ Server is running!"
          kill %1

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-app
          path: |
            server.js
            public/
            package.json